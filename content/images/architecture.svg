<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <style>
      .box { stroke-width: 2; rx: 12; ry: 12; }
      .label { font-size: 18px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .sub { font-size: 13px; fill: #334155; text-anchor: middle; }
      .mono { font-size: 12px; fill: #475569; text-anchor: middle; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .title { font-size: 28px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="980" fill="#f8fafc" />

  <!-- Title -->
  <text x="600" y="50" class="title">VideoStreamer — Architecture</text>

  <!-- Browser -->
  <rect x="450" y="90" width="300" height="80" class="box" fill="#dbeafe" stroke="#3b82f6" />
  <text x="600" y="125" class="label">User Browser</text>
  <text x="600" y="148" class="sub">Mux Player + UI</text>

  <!-- Arrow Browser -> Next.js -->
  <line x1="600" y1="170" x2="600" y2="215" class="line" marker-end="url(#arrow)" />

  <!-- Next.js -->
  <rect x="200" y="220" width="800" height="160" class="box" fill="#ede9fe" stroke="#8b5cf6" />
  <text x="600" y="252" class="label">Next.js 16 — App Router (Replit / Vercel)</text>
  <text x="600" y="285" class="sub">Pages: /  •  /video/[id]  •  /playlists  •  /admin</text>
  <text x="600" y="310" class="sub">API: /api/video/*  •  /api/playlist/*  •  /api/admin/*</text>
  <text x="600" y="340" class="mono">Auth: anonymous vs_uid cookie  •  admin: HMAC cookie</text>

  <!-- Arrows Next.js -> Mux + Firestore -->
  <line x1="400" y1="380" x2="320" y2="445" class="line" marker-end="url(#arrow)" />
  <line x1="800" y1="380" x2="880" y2="445" class="line" marker-end="url(#arrow)" />

  <!-- Mux Pool -->
  <rect x="50" y="450" width="540" height="200" class="box" fill="#ffedd5" stroke="#f97316" />
  <text x="320" y="485" class="label">Mux Accounts Pool</text>
  <text x="320" y="510" class="sub">@mux/mux-node</text>
  <text x="320" y="545" class="mono">pickAvailableAccount() — least-loaded with capacity</text>
  <text x="320" y="570" class="mono">used / max_limit  (FieldValue.increment ±1)</text>
  <text x="320" y="615" class="sub">Ingest URL  →  transcode  →  HLS</text>

  <!-- Firestore -->
  <rect x="610" y="450" width="540" height="200" class="box" fill="#dcfce7" stroke="#16a34a" />
  <text x="880" y="485" class="label">Firebase Firestore</text>
  <text x="880" y="510" class="sub">firebase-admin</text>
  <text x="880" y="545" class="mono">videos    •    playlists</text>
  <text x="880" y="570" class="mono">mux_accounts    •    settings</text>
  <text x="880" y="615" class="sub">Source of truth across all accounts</text>

  <!-- Arrow Mux -> Player -->
  <line x1="320" y1="650" x2="320" y2="715" class="line" marker-end="url(#arrow)" />

  <!-- HLS Player -->
  <rect x="50" y="720" width="540" height="100" class="box" fill="#cffafe" stroke="#0891b2" />
  <text x="320" y="758" class="label">Mux CDN  →  HLS Playback</text>
  <text x="320" y="785" class="sub">@mux/mux-player-react in the browser</text>

  <!-- Cron -->
  <rect x="610" y="720" width="540" height="120" class="box" fill="#fef9c3" stroke="#ca8a04" />
  <text x="880" y="755" class="label">Vercel Cron  (every 10 min)</text>
  <text x="880" y="780" class="mono">/api/cron/cleanup</text>
  <text x="880" y="805" class="sub">Deletes expired videos from Mux + Firestore</text>
  <text x="880" y="825" class="sub">Decrements account.used atomically</text>

  <!-- Cron arrows back to Mux + Firestore -->
  <line x1="700" y1="720" x2="500" y2="650" class="line" stroke-dasharray="4 4" marker-end="url(#arrow)" />
  <line x1="880" y1="720" x2="880" y2="650" class="line" stroke-dasharray="4 4" marker-end="url(#arrow)" />

  <!-- Caption -->
  <text x="600" y="900" class="sub">Flow: paste URL → pick Mux account → write Firestore record → poll status → ready → stream via Mux CDN</text>
  <text x="600" y="925" class="mono" fill="#94a3b8">— solid arrows: request flow      — dashed arrows: scheduled cleanup —</text>
</svg>
